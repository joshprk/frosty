name: Documentation

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
      - run: |
          pip install mkdocs mkdocs-material
      - run: |
          mkdir -p site
      - run: |
          mkdocs build --site-dir site
      - uses: actions/upload-pages/artifact@v3
        with:
          path: site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
